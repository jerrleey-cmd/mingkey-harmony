name: Build HarmonyOS HAP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/sanchuanhehe/harmony-next-pipeline-docker/harmonyos-ci-image:v5.0.4

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          cd $GITHUB_WORKSPACE
          ohpm install --all 2>&1 || true

      - name: Build HAP
        run: |
          cd $GITHUB_WORKSPACE
          hvigorw clean --no-daemon 2>&1 || true
          hvigorw assembleHap --mode module -p product=default -p buildMode=debug --no-daemon 2>&1

      - name: Upload HAP artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mingkey-hap
          path: |
            **/*.hap
            **/*.app
          if-no-files-found: warn

      - name: Build summary
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          find . -name "*.hap" -o -name "*.app" | while read f; do
            echo "- \`${f}\` ($(du -h "$f" | cut -f1))" >> $GITHUB_STEP_SUMMARY
          done
          if [ -z "$(find . -name '*.hap')" ]; then
            echo "⚠️ No HAP files generated. Check build logs." >> $GITHUB_STEP_SUMMARY
          fi
