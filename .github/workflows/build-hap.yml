name: Build HarmonyOS HAP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/sanchuanhehe/harmony-next-pipeline-docker/harmonyos-ci-image:v5.0.4

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          cd $GITHUB_WORKSPACE
          # 配置 npm 使用华为镜像（@ohos包在npm仓库）
          export NODE_HOME=$COMMANDLINE_TOOL_DIR/command-line-tools/tool/node
          export PATH=$NODE_HOME/bin:$PATH
          npm config set registry https://repo.huaweicloud.com/repository/npm/
          npm config set "@ohos:registry" https://repo.harmonyos.com/npm/
          # 安装 hvigor 插件
          npm install @ohos/hvigor-ohos-plugin@5.0.4 --save-dev 2>&1 || true

      - name: Build HAP (entry)
        run: |
          cd $GITHUB_WORKSPACE
          hvigorw clean --no-daemon 2>&1 || true
          hvigorw assembleHap --mode module -p product=default -p buildMode=debug --no-daemon 2>&1

      - name: Get build output
        id: get_build_output
        run: |
          cd $GITHUB_WORKSPACE
          # Find all HAP files
          echo "=== HAP files ==="
          find . -name "*.hap" -type f 2>/dev/null || echo "No HAP files found"
          # Get output path
          OUTPUT_DIR=$(find . -path "*/build/default/outputs/default" -type d | head -1)
          if [ -n "$OUTPUT_DIR" ]; then
            echo "output_path=$GITHUB_WORKSPACE/$OUTPUT_DIR" >> $GITHUB_OUTPUT
          fi

      - name: Upload HAP artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mingkey-hap
          path: |
            **/*.hap
            **/*.app
          if-no-files-found: warn

      - name: Build summary
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          find . -name "*.hap" -o -name "*.app" | while read f; do
            SIZE=$(du -h "$f" | cut -f1)
            echo "- \`${f}\` (${SIZE})" >> $GITHUB_STEP_SUMMARY
          done
          if [ -z "$(find . -name '*.hap')" ]; then
            echo "⚠️ No HAP files generated. Check build logs above." >> $GITHUB_STEP_SUMMARY
          fi
